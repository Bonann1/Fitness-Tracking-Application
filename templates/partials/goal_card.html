<div class="card mb-2">
  <div class="card-body py-2">
    <div class="d-flex justify-content-between align-items-center">
      <div>
        <a href="{% url 'goal_detail' goal.pk %}" class="text-decoration-none fw-semibold">{{ goal.title }}</a>
        <br>
        <small class="text-muted">
          {% if goal.goal_type == 'metric' %}
            <i class="bi bi-bullseye"></i> Target: {{ goal.target_value }} {{ goal.get_metric_display }}
          {% else %}
            <i class="bi bi-check2-circle"></i> Generico
          {% endif %}
          {% if goal.deadline %}
            &nbsp;| Scadenza: {{ goal.deadline }}
          {% endif %}
        </small>
      </div>
      <span class="badge {% if goal.status == 'active' %}bg-success{% elif goal.status == 'completed' %}bg-primary{% else %}bg-secondary{% endif %}">
        {{ goal.get_status_display }}
      </span>
    </div>
  </div>
</div>
