<div class="card mb-3">
  <div class="card-body">
    <div class="d-flex justify-content-between align-items-start">
      <div>
        <h6 class="card-title mb-1">
          <a href="{% url 'workout_detail' workout.pk %}" class="text-decoration-none">{{ workout.title }}</a>
        </h6>
        <small class="text-muted">
          <i class="bi bi-calendar3"></i> {{ workout.date }}
          &nbsp;|&nbsp;
          <i class="bi bi-clock"></i> {{ workout.duration }} min
        </small>
      </div>
      <span class="badge bg-secondary">{{ workout.workout_exercises.count }} esercizi</span>
    </div>
  </div>
</div>
