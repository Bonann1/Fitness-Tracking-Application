{% extends "base.html" %}
{% block title %}Elimina Obiettivo — Fitness Tracker{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card border-danger">
      <div class="card-header bg-danger text-white">
        <strong><i class="bi bi-exclamation-triangle"></i> Conferma Eliminazione</strong>
      </div>
      <div class="card-body">
        <p>Eliminare l'obiettivo <strong>{{ object.title }}</strong>?</p>
        <p class="text-muted small">I progressi collegati non verranno eliminati.</p>
        <form method="post">
          {% csrf_token %}
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-danger">Elimina</button>
            <a href="{% url 'goal_detail' object.pk %}" class="btn btn-outline-secondary">Annulla</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
