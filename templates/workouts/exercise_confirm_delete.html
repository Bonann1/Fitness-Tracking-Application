{% extends "base.html" %}
{% block title %}Rimuovi Esercizio — Fitness Tracker{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card border-danger">
      <div class="card-header bg-danger text-white">
        <strong><i class="bi bi-exclamation-triangle"></i> Conferma Rimozione</strong>
      </div>
      <div class="card-body">
        <p>Rimuovere <strong>{{ object.exercise.name }}</strong> dal workout?</p>
        <form method="post">
          {% csrf_token %}
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-danger">Rimuovi</button>
            <a href="{% url 'workout_detail' object.workout.pk %}" class="btn btn-outline-secondary">Annulla</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
