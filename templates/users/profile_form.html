{% extends "base.html" %}
{% block title %}Modifica Profilo — Fitness Tracker{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card">
      <div class="card-header"><strong><i class="bi bi-pencil"></i> Modifica Profilo</strong></div>
      <div class="card-body">
        <form method="post" enctype="multipart/form-data">
          {% csrf_token %}
          {% for field in form %}
            <div class="mb-3">
              <label class="form-label fw-semibold">{{ field.label }}</label>
              {{ field }}
              {% for error in field.errors %}
                <div class="text-danger small">{{ error }}</div>
              {% endfor %}
            </div>
          {% endfor %}
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">Salva</button>
            <a href="{% url 'profile' %}" class="btn btn-outline-secondary">Annulla</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
