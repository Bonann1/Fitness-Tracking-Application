{% extends "base.html" %}
{% block title %}Login — Fitness Tracker{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h3 class="card-title text-center mb-4"><i class="bi bi-person-lock"></i> Accedi</h3>
        <form method="post">
          {% csrf_token %}
          {% for field in form %}
            <div class="mb-3">
              <label class="form-label fw-semibold">{{ field.label }}</label>
              <input type="{{ field.field.widget.input_type }}" name="{{ field.html_name }}"
                     class="form-control {% if field.errors %}is-invalid{% endif %}"
                     {% if field.value %}value="{{ field.value }}"{% endif %}>
              {% for error in field.errors %}
                <div class="invalid-feedback">{{ error }}</div>
              {% endfor %}
            </div>
          {% endfor %}
          <div class="d-grid mt-4">
            <button type="submit" class="btn btn-primary btn-lg">Accedi</button>
          </div>
        </form>
        <hr>
        <p class="text-center mb-0">Non hai un account?
          <a href="{% url 'register' %}">Registrati</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
